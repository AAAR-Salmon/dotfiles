# TrueColor
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",$TERM:Tc"

# OSC 52
set -g set-clipboard on
set -g allow-passthrough on

# OSC 8 (Hyperlinks)
set -ga terminal-features ",*:hyperlinks"

# Clear history by C-l w/o prefix
bind -T root C-l send-keys C-l\; clear-history

# Vi keybinds
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -bi"

# Set new pane current directory
bind '%' split-window -h -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'

# Allow scroll by mouse
setw -g mouse on
bind -T edit-mode-vi WheelUpPane send-keys -X scroll-up
bind -T edit-mode-vi WheelDownPane send-keys -X scroll-down

set-option -g history-limit 20000

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect#cff343cf9e81983d3da0c8562b01616f12e8d548'
set -g @resurrect-strategy-nvim 'session'

# bootstrap tpm
if "test ! -d $HOME/.local/share/tmux/plugins/tpm" \
   "run 'TPM=\$TMUX_PLUGIN_MANAGER_PATH/tpm && git init \$TPM && git -C \$TPM remote add origin https://github.com/tmux-plugins/tpm && git -C \$TPM fetch --depth 1 origin e261deb1b47614eed3400089ce7197dc68acc4eb && git -C \$TPM checkout FETCH_HEAD && \$TPM/bin/install_plugins'"

# Initialize tpm (keep this line at the very bottom of tmux.conf)
run "$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm"
